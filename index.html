<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Signal - Quotex Real</title>
    <style>
        body { margin:0; background:#0d1117; color:#c9d1d9; font-family:Segoe UI,sans-serif; display:flex; justify-content:center; align-items:center; min-height:100vh; text-align:center; }
        .container { max-width:500px; padding:20px; }
        h1 { color:#58a6ff; margin-bottom:5px; }
        .pair-box { background:#161b22; border-radius:10px; padding:10px; margin:10px 0; }
        .signal-box { background:#161b22; border-radius:15px; padding:30px 20px; margin:20px 0; }
        #action { font-size:3.5rem; font-weight:bold; margin:10px 0; }
        #confidence { opacity:0.8; font-size:1.2rem; }
        .meta { opacity:0.7; font-size:0.9rem; margin:5px 0; }
        .refresh-btn { background:#30363d; color:white; border:none; padding:12px 30px; border-radius:8px; font-size:1rem; cursor:pointer; }
        .note { opacity:0.5; font-size:0.8rem; margin-top:20px; }
    </style>
</head>
<body>
<div class="container">
    <h1>🎯 Master Signal</h1>
    <div class="pair-box">
        <strong>Currency Pair:</strong> EUR/USD OTC<br>
        <strong>Timeframe:</strong> 30 Seconds
    </div>
    <div class="signal-box">
        <div>বর্তমান সংকেত</div>
        <div id="action" style="color:gray">⏳</div>
        <div id="confidence"></div>
        <div class="meta">Last updated: <span id="lastUpdate">--</span></div>
    </div>
    <button class="refresh-btn" onclick="fetchSignal()">🔄 Refresh Now</button>
    <p class="note">Auto-refresh every 30s. Trade based on this signal.</p>
</div>
<script>
    async function fetchSignal() {
        try {
            let resp = await fetch('/signal');
            if (!resp.ok) throw new Error('No data');
            let data = await resp.json();
            let actionEl = document.getElementById('action');
            actionEl.textContent = data.action;
            actionEl.style.color = data.action === 'CALL' ? '#3fb950' : '#f85149';
            document.getElementById('confidence').textContent = `Confidence: ${data.confidence}%`;
            document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString();
        } catch(e) {
            document.getElementById('action').textContent = '⏳';
        }
    }

    window.onload = () => {
        fetchSignal();
        setInterval(fetchSignal, 30000);
    };
</script>
</body>
</html>
